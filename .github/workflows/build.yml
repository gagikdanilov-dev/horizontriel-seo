name: Build & Deploy SEO pages

on:
  push:
    branches: [ main ]
    paths: [ "build.py", "templates.py", "config.py", ".github/workflows/build.yml" ]
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate static site
        env:
          PB_URL:        ${{ vars.PB_URL }}
          PB_COLLECTION: ${{ vars.PB_COLLECTION }}
          PB_SETTINGS:   ${{ vars.PB_SETTINGS }}
          SITE_BASE:     ${{ vars.SITE_BASE }}
          MAIN_SITE:     ${{ vars.MAIN_SITE }}
        run: python build.py

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deploy
        uses: actions/deploy-pages@v4
